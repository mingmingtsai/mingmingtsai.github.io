<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APCS o711 裝飲料水位模擬器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f8ff;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .input-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 140px;
        }
        input {
            width: 80px;
            padding: 5px;
        }
        #cup-visualization {
            margin-top: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 杯子外殼 */
        .cup-part {
            border: 3px solid #333;
            border-top: none;
            position: relative;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.5);
            transition: width 0.3s, height 0.3s;
        }
        /* 水的顏色 */
        .water {
            background-color: #3498db;
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.5s ease-out;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>裝飲料水位變化模擬</h2>
    <p>設定杯子參數 (依據題目 o711 [1]):</p>
    
    <div class="input-group">
        <label>底層寬度 (w1):</label>
        <input type="number" id="w1" value="10" min="1"> cm
    </div>
    <div class="input-group">
        <label>底層高度 (h1):</label>
        <input type="number" id="h1" value="10" min="1"> cm
    </div>
    <div class="input-group">
        <label>上層寬度 (w2):</label>
        <input type="number" id="w2" value="5" min="1"> cm
    </div>
    <div class="input-group">
        <label>上層高度 (h2):</label>
        <input type="number" id="h2" value="10" min="1"> cm
    </div>
    
    <hr>
    
    <div class="input-group">
        <label>倒入飲料量 (v):</label>
        <input type="number" id="v_input" value="100" min="1"> cm³
        <button onclick="pourWater()">倒入飲料</button>
        <button onclick="resetCup()" style="background-color: #e74c3c;">重設</button>
    </div>

    <div class="status" id="display-info">
        目前總高度：0 cm <br>
        本次上升：0 cm
    </div>

    <div id="cup-visualization">
        <!-- 上層長方體 -->
        <div id="top-block" class="cup-part">
            <div id="water-top" class="water" style="height: 0%;"></div>
        </div>
        <!-- 下層長方體 -->
        <div id="bottom-block" class="cup-part">
            <div id="water-bottom" class="water" style="height: 0%;"></div>
        </div>
    </div>
</div>

<script>
    let currentTotalVolume = 0;
    let currentHeight = 0;

    function pourWater() {
        // 取得參數
        const w1 = parseFloat(document.getElementById('w1').value);
        const h1 = parseFloat(document.getElementById('h1').value);
        const w2 = parseFloat(document.getElementById('w2').value);
        const h2 = parseFloat(document.getElementById('h2').value);
        const v = parseFloat(document.getElementById('v_input').value);

        const area1 = w1 * w1;
        const area2 = w2 * w2;
        const maxVol1 = area1 * h1;
        const maxVol2 = area2 * h2;
        const totalCapacity = maxVol1 + maxVol2;

        const oldHeight = currentHeight;
        currentTotalVolume += v;

        // 當水杯滿時水位不再上升 [1]
        if (currentTotalVolume > totalCapacity) {
            currentTotalVolume = totalCapacity;
        }

        // 計算新高度
        let newHeight = 0;
        if (currentTotalVolume <= maxVol1) {
            newHeight = currentTotalVolume / area1;
        } else {
            newHeight = h1 + (currentTotalVolume - maxVol1) / area2;
        }

        currentHeight = newHeight;
        const rise = currentHeight - oldHeight;

        updateUI(w1, h1, w2, h2, currentHeight, rise);
    }

    function updateUI(w1, h1, w2, h2, h, rise) {
        // 更新視覺比例 (放大 10 倍以方便觀察)
        const scale = 10;
        
        const bottomBlock = document.getElementById('bottom-block');
        const topBlock = document.getElementById('top-block');
        const waterBottom = document.getElementById('water-bottom');
        const waterTop = document.getElementById('water-top');

        bottomBlock.style.width = (w1 * scale) + 'px';
        bottomBlock.style.height = (h1 * scale) + 'px';
        topBlock.style.width = (w2 * scale) + 'px';
        topBlock.style.height = (h2 * scale) + 'px';

        // 計算水的高度顯示
        if (h <= h1) {
            waterBottom.style.height = ((h / h1) * 100) + '%';
            waterTop.style.height = '0%';
        } else {
            waterBottom.style.height = '100%';
            waterTop.style.height = (((h - h1) / h2) * 100) + '%';
        }

        document.getElementById('display-info').innerHTML = 
            `目前總高度：${h.toFixed(2)} cm <br>` +
            `本次上升：${rise.toFixed(2)} cm`;
    }

    function resetCup() {
        currentTotalVolume = 0;
        currentHeight = 0;
        document.getElementById('water-bottom').style.height = '0%';
        document.getElementById('water-top').style.height = '0%';
        document.getElementById('display-info').innerHTML = "目前總高度：0 cm <br> 本次上升：0 cm";
    }

    // 初始化顯示
    window.onload = () => {
        const w1 = parseFloat(document.getElementById('w1').value);
        const h1 = parseFloat(document.getElementById('h1').value);
        const w2 = parseFloat(document.getElementById('w2').value);
        const h2 = parseFloat(document.getElementById('h2').value);
        updateUI(w1, h1, w2, h2, 0, 0);
    };
</script>

</body>
</html>
